# pagefault — example configuration covering every backend type.
#
# This config is a tour, not a minimum. It demonstrates all five backend
# types (filesystem, subprocess, http, subagent-cli, subagent-http) so
# you can see how each one is declared. For the smallest runnable
# config, see configs/minimal.yaml.
#
# As shipped, only the `fs` and `sa` backends are active — the other
# three are commented out because they need external dependencies
# (ripgrep, a running HTTP API, an agent runtime). Uncomment and edit
# them to match your environment.
#
# Run with:
#   pagefault serve --config configs/example.yaml
#
# Then try:
#   curl -s localhost:8444/api/pf_maps -X POST | jq
#   curl -s localhost:8444/api/pf_ps   -X POST | jq
#   curl -s localhost:8444/api/pf_fault -X POST \
#     -H 'Content-Type: application/json' \
#     -d '{"query":"hello"}' | jq

server:
  host: "127.0.0.1"
  port: 8444
  # public_url: "https://pagefault.example.com"
  #
  # MCP transports and initialize-time metadata. Both /mcp (streamable-http)
  # and /sse + /message (legacy SSE) are mounted by default, so Claude Code
  # and Claude Desktop can both connect without any extra bridging.
  mcp:
    sse_enabled: true   # set false to disable /sse + /message
    # ── SSE keepalive ─────────────────────────────
    # sse_keepalive: true                 # default; emits JSON-RPC ping
    #                                     # events on the /sse stream to
    #                                     # keep intermediate proxies from
    #                                     # closing the connection mid-call
    #                                     # (nginx proxy_read_timeout 60s,
    #                                     # Node undici headersTimeout 60s,
    #                                     # Cloudflare free plan 100s, …).
    #                                     # Only opt out if you have
    #                                     # verified your proxy chain never
    #                                     # closes idle SSE.
    # sse_keepalive_interval_seconds: 15  # default; longer than mcp-go's
    #                                     # 10s default, comfortably under
    #                                     # common proxy idle timeouts.
    #                                     # Lower it for aggressive proxies.
    # instructions: |
    #   Optional override for the server-level instructions string
    #   advertised in the MCP initialize response. This is a full
    #   REPLACE of the built-in default (not a layer) — empty uses
    #   the default from internal/tool/instructions.go, which ships
    #   with cross-language signal phrases, a "don't claim no
    #   memory" core rule, multi-agent routing guidance, and a
    #   120s timeout floor. Only override when you want to name
    #   YOUR specific backends / agents by name, which is the
    #   single highest-leverage routing hint in a multi-MCP
    #   session. See docs/config-doc.md → "Instructions override:
    #   worked example" for a full template. Minimum viable shape:
    #
    #   pagefault is my personal memory server. Backends include
    #   a daily journal at memory://daily/YYYY-MM-DD.md, project
    #   notes under memory://projects/<name>/, and a lossless-lcm
    #   archive of every past chat session with wocha (work) and
    #   cha (personal). Do not say "I don't remember" / "我不记得"
    #   without first calling pf_scan or pf_fault — your context
    #   is only this session, the archive covers everything else.
    #   In multi-agent setups call pf_ps first and pick by
    #   description; never set pf_fault.timeout_seconds below 120.

auth:
  mode: "none"   # for a live deployment, use "bearer" + a tokens file

# ── Backends ────────────────────────────────────

backends:
  # (1) Filesystem — the Phase-1 workhorse. Serves markdown files from
  # a directory tree, with include/exclude globs, auto-tagging, and a
  # sandbox against symlink escapes. Phase-4 write fields (writable /
  # write_paths / write_mode / max_entry_size / file_locking) are
  # commented out below — enable them to unlock `pf_poke` direct-append
  # writes against this backend. Leaving them off keeps the backend
  # read-only, which is the safe default.
  - name: fs
    type: filesystem
    root: "./demo-data"
    include: ["**/*.md"]
    exclude: []
    uri_scheme: "memory"
    sandbox: true
    auto_tag:
      "**/*.md": ["demo", "markdown"]
    # ── Phase-4 writeback (opt-in) ───────────────
    # writable: true
    # write_paths:
    #   # IMPORTANT: patterns here must include the URI scheme
    #   # (memory://...). A scheme-less pattern like `notes/*.md`
    #   # would silently match nothing. Unlike `include` above,
    #   # which matches relative paths.
    #   - "memory://notes/*.md"
    # write_mode: "append"         # "any" unlocks format:"raw"
    # max_entry_size: 2000         # raw bytes; entry and raw share one budget
    # file_locking: "flock"        # or "none" for single-writer deployments

  # (2) Subagent (CLI) — spawns an external process for pf_fault. The
  # echo template below is a no-op stand-in so you can exercise pf_ps
  # and pf_fault without installing anything: `pagefault fault hello`
  # will return "alpha:hello". Swap in a real agent runner (openclaw,
  # claude-code, a custom shell script, etc.) for anything useful.
  - name: sa
    type: subagent-cli
    command: "echo {agent_id}:{task}"
    timeout: 60
    # Subagent prompt wrapping (0.6.0+). Pagefault prepends a
    # resolved template to the raw caller content before
    # substituting {task} here, so a fresh subagent knows its job
    # is memory retrieval / placement rather than generic Q&A.
    # Leaving these empty uses the built-in DefaultRetrieve... /
    # DefaultWritePromptTemplate constants from
    # internal/backend/prompt.go — a sensible starting point.
    # Override only for installation-specific framing (e.g. "my
    # notes live in a custom Obsidian vault at ~/brain"):
    #
    # retrieve_prompt_template: |
    #   You are wocha's memory retriever. Your job is to SEARCH
    #   the user's memory (MEMORY.md, ~/workspace/memory/**, the
    #   lossless-lcm database) for content matching the query
    #   below. Do not answer from your own training data.
    #
    #   QUERY: {task}
    #   {time_range}
    # write_prompt_template: |
    #   You are wocha's memory writer. Persist the content below
    #   into ~/workspace/memory/ using the YYYY-MM-DD.md daily
    #   layout. Extend existing entries when the theme matches.
    #
    #   TARGET HINT: {target}
    #   CONTENT: {task}
    agents:
      # Agent descriptions are the only routing signal a calling
      # agent has for multi-agent setups. Make each one specific —
      # "first configured, used as the default" is a bad example in
      # a real config because pf_fault / pf_poke mode:agent expect
      # the caller to read pf_ps and pick by scope (work vs
      # personal, short-term vs long-term, etc.). The alpha/beta
      # pair here is just a plumbing test, so their descriptions
      # are intentionally generic.
      - id: alpha
        description: "example echo agent — plumbing test only, not a real retriever"
        # Per-agent overrides (optional):
        # retrieve_prompt_template: "…"
        # write_prompt_template: "…"
      - id: beta
        description: "example echo agent — plumbing test only, pick via --agent beta"

  # (3) Subprocess — generic "run a command, parse stdout" backend.
  # Canonical use: ripgrep for fast indexed search across a corpus.
  # Uncomment and adjust `roots` to your workspace. `parse: ripgrep_json`
  # consumes ripgrep's `--json` output; alternatives are `grep` for
  # classic `path:lineno:content` or `plain` (one snippet per line).
  #
  # - name: rg
  #   type: subprocess
  #   command: "rg --json -i -n --max-count 20 {query} {roots}"
  #   roots:
  #     - "./demo-data"
  #   timeout: 10
  #   parse: "ripgrep_json"

  # (4) HTTP — generic "POST a search and decode the response" backend.
  # Useful for wiring pagefault against a remote search/index API
  # (LCM, Elastic, a custom endpoint). {query} is JSON-escaped and
  # {limit} is interpolated; `response_path` walks the JSON body to
  # find the array of hits. Each hit may expose `uri`, `snippet`,
  # `score`, and `metadata`.
  #
  # - name: lcm
  #   type: http
  #   base_url: "http://127.0.0.1:6443"
  #   auth:
  #     mode: "bearer"
  #     token: "${LCM_TOKEN}"   # ${ENV} substitution happens at load time
  #   search:
  #     method: "POST"
  #     path: "/api/lcm/search"
  #     body_template: '{"query": "{query}", "limit": {limit}}'
  #     response_path: "results"
  #   timeout: 15

  # (5) Subagent (HTTP) — spawns an agent via HTTP for pf_fault.
  # Useful when agents live behind a gateway. {agent_id} can appear in
  # the path or body; {task} is JSON-escaped before substitution.
  #
  # - name: sa-http
  #   type: subagent-http
  #   base_url: "https://localhost:6443/api"
  #   auth:
  #     mode: "bearer"
  #     token: "${AGENT_GATEWAY_TOKEN}"
  #   spawn:
  #     method: "POST"
  #     path: "/agents/{agent_id}/run"
  #     body_template: '{"task": "{task}", "timeout": {timeout}}'
  #     response_path: "result"
  #   timeout: 300
  #   agents:
  #     - id: wocha
  #       description: "Dev agent with full tool access"

# ── Contexts ────────────────────────────────────

contexts:
  - name: demo
    description: "Demo context — the README from ./demo-data"
    sources:
      - backend: fs
        uri: "memory://README.md"
    format: markdown
    max_size: 4000

# ── Tools ───────────────────────────────────────

tools:
  pf_maps:  true
  pf_load:  true
  pf_scan:  true
  pf_peek:  true
  pf_fault: true    # needs at least one subagent backend; sa above satisfies this
  pf_ps:    true
  pf_poke:  true    # shipped in 0.5.0; needs a writable backend for mode:direct
                    # (see the commented-out Phase-4 fields on the `fs` backend
                    # above) or a subagent backend for mode:agent.

# ── Filters ─────────────────────────────────────

filters:
  enabled: false    # flip to true and add path/tag rules in a real deployment
  # path:
  #   allow: ["memory://**"]             # read allowlist
  #   deny:  ["memory://secrets/**"]     # read denylist
  #   # Phase-4 write-specific layer. When both write_allow and
  #   # write_deny are empty, writes fall back to the read allow/deny
  #   # pair above. Setting either switches writes to use the write
  #   # pair exclusively — "read broadly, write narrowly". Stacks on
  #   # top of each backend's own `write_paths` allowlist.
  #   write_allow: ["memory://notes/*.md"]
  #   write_deny:  ["memory://notes/secret-*.md"]

# ── Audit ───────────────────────────────────────

audit:
  enabled: true
  mode: "stdout"    # CLI invocations auto-rewrite stdout → stderr so
                    # `pagefault load demo --json | jq .` stays clean.

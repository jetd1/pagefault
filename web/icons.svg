<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
     width="24" height="24" style="display:none" aria-hidden="true">
  <!--
    pagefault tool-glyph sprite — governed by docs/design.md §5.2.

    Each glyph is a 24×24 outline-only mark (1.5–1.75px stroke,
    round caps, round joins) that riffs on the Unix analog of its
    `pf_*` tool. Use via <svg><use href="./icons.svg#maps" /></svg>
    with currentColor so the mark inherits the parent's text color.
  -->

  <!-- pf_maps · a 2×2 grid of small rounded squares (address map) -->
  <symbol id="maps" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6"
       stroke-linecap="round" stroke-linejoin="round">
      <rect x="3"  y="3"  width="8" height="8" rx="1.2" />
      <rect x="13" y="3"  width="8" height="8" rx="1.2" />
      <rect x="3"  y="13" width="8" height="8" rx="1.2" />
      <rect x="13" y="13" width="8" height="8" rx="1.2" />
    </g>
  </symbol>

  <!-- pf_load · page with a downward arrow breaking the top edge -->
  <symbol id="load" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6"
       stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="9" width="16" height="12" rx="2" />
      <path d="M12 3 L12 15" />
      <path d="M8 11 L12 15 L16 11" />
    </g>
  </symbol>

  <!-- pf_scan · magnifying glass over a row of grid cells -->
  <symbol id="scan" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6"
       stroke-linecap="round" stroke-linejoin="round">
      <circle cx="10" cy="10" r="6" />
      <path d="M14.5 14.5 L21 21" />
      <circle cx="7.5"  cy="10" r="0.9" fill="currentColor" stroke="none" />
      <circle cx="10"   cy="10" r="0.9" fill="currentColor" stroke="none" />
      <circle cx="12.5" cy="10" r="0.9" fill="currentColor" stroke="none" />
    </g>
  </symbol>

  <!-- pf_peek · an eye bracketed by `[` and `]` -->
  <symbol id="peek" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 4 L3 4 L3 20 L5 20" />
      <path d="M19 4 L21 4 L21 20 L19 20" />
      <path d="M6 12 C 8 8, 16 8, 18 12 C 16 16, 8 16, 6 12 Z" />
      <circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none" />
    </g>
  </symbol>

  <!-- pf_fault · three forward chevrons (fault → handler → resolution) -->
  <symbol id="fault" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.8"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 6 L10 12 L5 18" />
      <path d="M11 6 L16 12 L11 18" />
      <path d="M17 6 L22 12 L17 18" />
    </g>
  </symbol>

  <!-- pf_ps · three process rows (bullet + line), like `ps` output -->
  <symbol id="ps" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6"
       stroke-linecap="round" stroke-linejoin="round">
      <circle cx="4"  cy="6"  r="1.2" fill="currentColor" stroke="none" />
      <path d="M9 6 L20 6" />
      <circle cx="4"  cy="12" r="1.2" fill="currentColor" stroke="none" />
      <path d="M9 12 L20 12" />
      <circle cx="4"  cy="18" r="1.2" fill="currentColor" stroke="none" />
      <path d="M9 18 L20 18" />
    </g>
  </symbol>

  <!-- pf_poke · page with an upward arrow breaking the bottom edge -->
  <symbol id="poke" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="1.6"
       stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="3" width="16" height="12" rx="2" />
      <path d="M12 21 L12 9" />
      <path d="M8 13 L12 9 L16 13" />
    </g>
  </symbol>
</svg>

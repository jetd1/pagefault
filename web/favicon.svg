<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
     width="24" height="24" role="img" aria-label="pagefault logomark">
  <!--
    pagefault logomark — governed by docs/design.md §5.1.

    A rounded square (the memory page) with a diagonal slice at
    one corner (the fault) and an inward chevron (the load
    direction). Outline-only at display sizes; the favicon
    preset below drops the chevron for legibility at 16px.

    Stroke = currentColor so the mark tints with context.
  -->
  <defs>
    <!-- The canonical mark referenced by <use href="favicon.svg#mark" />. -->
    <symbol id="mark" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="1.75"
         stroke-linecap="round" stroke-linejoin="round">
        <!-- page outline with top-right corner sliced off -->
        <path d="M5 4
                 L15 4
                 L20 9
                 L20 20
                 L5 20 Z" />
        <!-- the fault line — the slice across the corner -->
        <path d="M15 4 L15 9 L20 9" />
        <!-- the load chevron — pointing into the sliced corner -->
        <path d="M13 14 L16 12 L16 16 Z" fill="currentColor" stroke="none" />
      </g>
    </symbol>

    <!-- 16px favicon: drop the chevron, bare page + slice only. -->
    <symbol id="mark-16" viewBox="0 0 24 24">
      <g fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 4 L15 4 L20 9 L20 20 L5 20 Z" />
        <path d="M15 4 L15 9 L20 9" />
      </g>
    </symbol>
  </defs>

  <!-- Default rendering (used when the file is opened directly,
       or served as a favicon): amber on transparent so it reads
       on both light and dark browser chrome. -->
  <g color="#ff7e1f">
    <use href="#mark" />
  </g>
</svg>
